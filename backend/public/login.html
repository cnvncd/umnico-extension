<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Umnico Extension Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
    }

    .logo p {
      font-size: 14px;
      color: #718096;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #4a5568;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Umnico Extension</h1>
      <p>Панель администратора</p>
    </div>

    <div id="error" class="error"></div>

    <form id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" required autofocus placeholder="Введите пароль">
      </div>

      <button type="submit" class="btn" id="login-btn">Войти</button>
    </form>

    <div class="footer">
      © 2026 Umnico Extension
    </div>
  </div>

  <script>
    console.log('Login page script loaded');
    
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const errorDiv = document.getElementById('error');
    
    console.log('Elements found:', { form, passwordInput, loginBtn, errorDiv });

    form.addEventListener('submit', async (e) => {
      console.log('Submit event fired');
      e.preventDefault();
      e.stopPropagation();
      
      const password = passwordInput.value;
      
      console.log('Form submitted, password:', password ? 'provided' : 'empty');
      
      if (!password) {
        showError('Введите пароль');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Вход...';
      errorDiv.classList.remove('show');

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();
        
        console.log('Login response:', data);

        if (response.ok && data.success) {
          // Save session ID
          localStorage.setItem('sessionId', data.sessionId);
          console.log('Session saved, redirecting...');
          // Redirect to admin panel
          window.location.href = '/admin/';
        } else {
          showError(data.error || 'Неверный пароль');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Войти';
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Ошибка подключения к серверу');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
      }
    });

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
  </script>
</body>
</html>
